org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8 -XX:+UseG1GC
org.gradle.parallel=true
org.gradle.caching=true
# Configuration cache off for now — AGP 8.7.3 + JDK 17 trips a serializer
# bug on `MapSourceSetPathsTask`. Re-enable when we upgrade to AGP 8.11+.
org.gradle.configuration-cache=false

android.useAndroidX=true
android.nonTransitiveRClass=true
android.defaults.buildfeatures.buildconfig=true
android.nonFinalResIds=true

kotlin.code.style=official

# KSP1 mode — KSP2 (default since Kotlin 2.0) crashes with
# "unexpected jvm signature V" on Dagger-generated factories until
# androidx.hilt:hilt-compiler 1.4.x stabilises. KSP1 still works fine
# with Kotlin 2.2 (deprecation warnings only).
ksp.useKSP2=false
# Silence the deprecation banner that accompanies the line above.
warn.on.ksp1.usage=false
